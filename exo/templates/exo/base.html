<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ExoCollect</title>

  <!-- Bootstrap first -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Your site CSS after Bootstrap -->
  <link rel="stylesheet" href="{% static 'styles.css' %}?v=6">

  <!-- testing table sorting -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Top bar belongs in the body -->
  <div class="top-bar">
    <a href="{% url 'home' %}">
      <img src="{% static 'images/logo.png' %}" class="logo-left" alt="ExoCollect Logo">
    </a>

    <div class="nav-right">
      <a href="{% url 'home' %}" class="nav_mov">
        <img src="{% static 'images/buttons/home.png' %}" class="nav-btn" alt="Home">
      </a>
      <a href="{% url 'planet_archive' %}" class="nav_mov">
        <img src="{% static 'images/buttons/archive.png' %}" class="nav-btn" alt="Archive">
      </a>

      {% if user.is_authenticated %}
        <a href="{% url 'profile' pro.pk %}">
          <img src="{% static 'images/buttons/profile.png' %}" class="nav-btn" alt="Profile">
        </a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="logout-btn">
            <img src="{% static 'images/buttons/logout.png' %}" class="nav-btn" alt="Logout">
          </button>
        </form>
      {% else %}
        <a href="{% url 'signup' %}">
          <img src="{% static 'images/buttons/sign_up.png' %}" class="nav-btn" alt="Sign Up">
        </a>
        <a href="{% url 'login' %}">
          <img src="{% static 'images/buttons/login.png' %}" class="nav-btn login-btn" alt="Login">
        </a>
      {% endif %}
    </div>
  </div>

  {% block content %}{% endblock %}

</body>
</html>

{% load static %}
<!DOCTYPE html>

<div class="top-bar">
    <a href="{% url 'home' %}">
        <img src="{% static 'images/logo.png' %}" class="logo-left" alt="ExoCollect Logo">
    </a>
</div>

<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
<div class="container mt-5 white-text">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</div>
</body>
</html>

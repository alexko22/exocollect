<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Signup</h2>
    <form method="POST">
    {% csrf_token %}

    <h4>User Info</h4>
    {{ user_form.as_p }}

    <h4>Profile Info</h4>
    {{ profile_form.as_p }}

    <button type="submit" class="btn btn-success">Create Account</button>
</form>
</div>
</body>
</html>

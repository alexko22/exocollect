{% extends 'exo/base.html' %}

{% block content %}
<div class="container mt-5 signup-container">
    <h2>Signup</h2>
    <form method="POST">
        {% csrf_token %}
        <h4>User Info</h4>
        {{ user_form.as_p }}
        <h4>Profile Info</h4>
        {{ profile_form.as_p }}
        <button type="submit" class="btn btn-success">Create Account</button>
    </form>
</div>
{% endblock %}

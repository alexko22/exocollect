{% extends 'exo/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5 update-profile-container">
    <div class="auth-card p-4">
        <h2 class="text-center mb-4">Update Your Profile</h2>

        <form method="POST" novalidate>
            {% csrf_token %}

            {% for field in form %}
            <div class="form-row mb-4">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <div class="helptext mt-1">{{ field.help_text|safe }}</div>
                {% endif %}
                {% for err in field.errors %}
                    <div class="invalid-feedback d-block">{{ err }}</div>
                {% endfor %}
            </div>
            {% endfor %}

            <div class="text-center mt-4">
                <button type="submit" class="btn-auth">
                    <img src="{% static 'images/text/update.png' %}" alt="Update Profile">
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
